<mat-toolbar color="primary">
  <img src="icons/icon-96x96.png" alt="logo" class="toolbar-logo" />
  <span class="toolbar-title">{{ title() }}</span>
  <span class="spacer"></span>

  <nav class="desktop-nav">
    <button mat-button routerLink="/add-event">
      <mat-icon>add</mat-icon>
      Add
    </button>
    <button mat-button routerLink="/calendar">
      <mat-icon>calendar_month</mat-icon>
      Calendar
    </button>
    <button mat-button routerLink="/events">
      <mat-icon>list</mat-icon>
      Events
    </button>
    <button mat-button routerLink="/timers">
      <mat-icon>timer</mat-icon>
      Timers
    </button>
    <button mat-button routerLink="/statistics">
      <mat-icon>bar_chart</mat-icon>
      Stats
    </button>
    <button mat-button routerLink="/settings">
      <mat-icon>settings</mat-icon>
      Settings
    </button>
  </nav>
</mat-toolbar>

<div class="container">
  <router-outlet></router-outlet>
</div>

@if (onboarding.active()) {
  <app-onboarding></app-onboarding>
}

<!-- Mobile bottom nav -->
<nav class="mobile-nav">
  <a routerLink="/add-event" routerLinkActive="active" class="mobile-nav-item mobile-nav-add">
    <mat-icon>add</mat-icon>
    <span>Add</span>
  </a>
  <a routerLink="/calendar" routerLinkActive="active" class="mobile-nav-item">
    <mat-icon>calendar_month</mat-icon>
    <span>Calendar</span>
  </a>
  <a routerLink="/events" routerLinkActive="active" class="mobile-nav-item">
    <mat-icon>list</mat-icon>
    <span>Events</span>
  </a>
  <a routerLink="/timers" routerLinkActive="active" class="mobile-nav-item">
    <mat-icon>timer</mat-icon>
    <span>Timers</span>
  </a>
  <a routerLink="/statistics" routerLinkActive="active" class="mobile-nav-item">
    <mat-icon>bar_chart</mat-icon>
    <span>Stats</span>
  </a>
  <a routerLink="/settings" routerLinkActive="active" class="mobile-nav-item">
    <mat-icon>settings</mat-icon>
    <span>Settings</span>
  </a>
</nav>
